<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Sail - Scramjet</title>
	<script src="/uv/uv.bundle.js"></script>
	<script src="/uv/uv.config.js"></script>
	<script src="/baremux/index.js"></script>
	<script src="/scram/scramjet.all.js"></script>
	<link rel="stylesheet" href="/assets/css/colors/default.css" id="csslink" />
	<link rel="stylesheet" href="/assets/css/font.css?v=2" />
	<link rel="stylesheet" href="/assets/icons/css/all-pro.css" />
	<script src="https://cdnjs.cloudflare.com/ajax/libs/eruda/3.4.3/eruda.min.js"></script>
	<script>
		navigator.serviceWorker.register("/sw.js", { scope: "/scramjet/" });
		navigator.serviceWorker.register("/uv/sw.js");
	</script>
</head>
<style>
	html,
	body {
		margin: 0;
		width: 100%;
		height: 100%;
		overflow: hidden;
		background: linear-gradient(180deg, var(--bg) 0%, var(--bg-1) 100%);
	}

	#frame {
		position: fixed;
		inset: 0;
		width: 100vw;
		height: 100vh;
		border: 0;
	}

	.loadingthingy {
		position: fixed;
		left: 50%;
		top: 50%;
		transform: translate(-50%, -50%);
		width: min(320px, calc(100vw - 32px));
		padding: 16px 16px 14px;
		box-sizing: border-box;
		color: var(--bright-text);
		background: color-mix(in srgb, var(--bg-2) 88%, transparent);
		border: 1px solid var(--border-4);
		border-radius: 14px;
		box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
		backdrop-filter: blur(16px);
		z-index: 5;
		transition: opacity 0.2s ease, transform 0.2s ease;
	}

	.loadingthingy.hidden {
		opacity: 0;
		transform: translate(-50%, calc(-50% + 8px));
		pointer-events: none;
	}

	.loadingthingy .toprow {
		display: flex;
		align-items: center;
		gap: 12px;
	}

	.loadingthingy .copy {
		min-width: 0;
	}

	.loadingthingy h1 {
		margin: 0 0 4px 0;
		font-size: 18px;
		line-height: 1.1;
	}

	.loadingthingy p {
		margin: 0;
		font-size: 13px;
		line-height: 1.35;
		color: var(--text);
		opacity: 0.82;
	}

	.spinner {
		width: 28px;
		height: 28px;
		flex: 0 0 auto;
		border-radius: 50%;
		border: 3px solid color-mix(in srgb, var(--border-4) 76%, transparent);
		border-top-color: var(--accent);
		animation: spin 0.8s linear infinite;
	}

	.statusline {
		display: flex;
		align-items: center;
		gap: 8px;
		margin-top: 12px;
		font-size: 12px;
		color: var(--text);
		opacity: 0.8;
	}

	.statusdot {
		width: 7px;
		height: 7px;
		border-radius: 999px;
		background: var(--accent);
		box-shadow: 0 0 0 6px color-mix(in srgb, var(--accent) 14%, transparent);
		animation: pulse 1.25s ease-in-out infinite;
	}

	.progress {
		width: 100%;
		position: relative;
		height: 4px;
		background: var(--bg-3);
		border-radius: 8px;
		margin-top: 14px;
		overflow: hidden;
	}

	.progress .inner {
		position: absolute;
		inset: 0 auto 0 0;
		width: 42%;
		border-radius: 8px;
		background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent) 45%, white));
		animation: progressLoop 1.1s infinite linear;
	}

	@keyframes spin {
		from {
			transform: rotate(0deg);
		}

		to {
			transform: rotate(360deg);
		}
	}

	@keyframes progressLoop {
		0% {
			transform: translateX(-110%);
		}

		100% {
			transform: translateX(340%);
		}
	}

	@keyframes pulse {

		0%,
		100% {
			transform: scale(1);
			opacity: 1;
		}

		50% {
			transform: scale(0.88);
			opacity: 0.72;
		}
	}
</style>

<body class="obfuscate">
	<iframe src="" sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-downloads"
		frameborder="0" id="frame"></iframe>

	<div class="loadingthingy" id="loadingthingy">
		<div class="toprow">
			<div class="spinner" aria-hidden="true"></div>
			<div class="copy">
				<h1>Loading...</h1>
				<p>This might take a bit.</p>
			</div>
		</div>
		<div class="statusline">
			<div class="statusdot" aria-hidden="true"></div>
			<span id="loading-status">Setting up transport...</span>
		</div>
		<div class="progress">
			<div class="inner"></div>
		</div>
	</div>

	<script>
		const params = new URLSearchParams(window.location.search);
		const frame = document.getElementById("frame");
		const loadingThingy = document.getElementById("loadingthingy");
		const loadingStatus = document.getElementById("loading-status");
		const connection = new BareMux.BareMuxConnection("/baremux/worker.js");
		const type = params.get("type") || "sj";
		const defaultWispUrl =
			(window.location.protocol === "https:" ? "wss://" : "ws://") +
			window.location.host +
			"/socket/";
		const wispUrl = defaultWispUrl;
		function setLoadingStatus(message) {
			loadingStatus.textContent = message;
		}

		function hideLoader() {
			loadingThingy.classList.add("hidden");
			setTimeout(() => {
				loadingThingy.style.display = "none";
			}, 220);
		}

		frame.addEventListener("load", hideLoader);

		(async function () {
			const selectedTransport = localStorage.getItem("cherri_transport") || "libcurl";

			switch (selectedTransport) {
				case "libcurl":
					connection.setTransport("/libcurl/index.mjs", [{ websocket: wispUrl }]);
					break;
				case "epoxy":
					connection.setTransport("/epoxy/index.mjs", [{ wisp: wispUrl }]);
					break;
				default:
					connection.setTransport("/libcurl/index.mjs", [{ websocket: wispUrl }]);
					break;
			}
			setLoadingStatus(`Loading ${type === "sj" ? "Scramjet" : "Ultraviolet"}...`)
		})()

		const { ScramjetController } = $scramjetLoadController();
		const scramjet = new ScramjetController({
			files: {
				all: "/scram/scramjet.all.js",
				sync: "/scram/scramjet.sync.js",
				wasm: "/scram/scramjet.wasm.wasm",
			},
		});

		scramjet.init();
		setLoadingStatus("Loading the page...")

		if (params.has("link")) {
			(async function () {
				setLoadingStatus("Checking transport...");

				if (!(await connection.getTransport())) {
					setLoadingStatus("Waiting on transport...");
					const selectedTransport = localStorage.getItem("cherri_transport") || "libcurl";

					switch (selectedTransport) {
						case "libcurl":
							connection.setTransport("/libcurl/index.mjs", [{ websocket: wispUrl }]);
							break;
						case "epoxy":
							connection.setTransport("/epoxy/index.mjs", [{ wisp: wispUrl }]);
							break;
						default:
							connection.setTransport("/libcurl/index.mjs", [{ websocket: wispUrl }]);
							break;
					}
				}

				setLoadingStatus("Loading the page...");
				setTimeout(() => {
					frame.src = type === "sj"
						? scramjet.encodeUrl(params.get("link"))
						: __uv$config.prefix + __uv$config.encodeUrl(params.get("link"));
				}, 250);
			})();
		}
	</script>
	<script>
		document.getElementById("csslink").href =
			`/assets/css/colors/${localStorage.getItem("cherri_theme") ?? "default"}.css`;
	</script>
	<script>
		window.addEventListener("keydown", (e) => {
			if (e.altKey && e.code === "KeyG") {
				parent.postMessage({ type: "alt-g" }, "*");
			}
		});
	</script>

	<script src="/assets/js/cherri.ads.js"></script>
</body>

</html>
