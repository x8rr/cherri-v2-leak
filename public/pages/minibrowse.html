<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Sail - Scramjet</title>
		<script src="/baremux/index.js"></script>
		<script src="/scram/scramjet.all.js"></script>
		<link
			rel="stylesheet"
			href="/assets/css/colors/default.css"
			id="csslink"
		/>
		<link rel="stylesheet" href="/assets/css/font.css?v=2" />
		<link rel="stylesheet" href="/assets/icons/css/all-pro.css" />
		<script src="https://cdnjs.cloudflare.com/ajax/libs/eruda/3.4.3/eruda.min.js"></script>
		<script>
			navigator.serviceWorker.register("/sw.js", { scope: "/scramjet/" });
		</script>
	</head>

	<body class="obfuscate">
		<style>
			html {
				z-index: 111;
			}

			iframe.viewframe,
			iframe.browser-frame {
				height: calc(100vh - 80px);
				width: 100vw;
				background: var(--bg) !important;
				position: absolute;
				left: 0;
				bottom: 0px;
				border: none;
				pointer-events: none;
				opacity: 0;
				border-radius: 20px;
				z-index: 2;
			}

			iframe.active {
				opacity: 1;
				pointer-events: all;
				background: var(--bg);
			}

			.controls {
				height: 115px;
				background: var(--bg);
				width: 100vw;
				position: fixed;
				left: 0;
				top: 0;
				padding: 5px;
			}

			.tabs {
				position: absolute;
				left: 0;
				top: 2.5px;
				padding: 4px 10px;
				width: 100%;
				height: 50px;
				display: flex;
				gap: 5px;
			}

			.tab {
				background: var(--bg-2);
				width: 200px;
				height: 45px;
				border-radius: 20px;
				padding: 7.5px;
				box-sizing: border-box;
				position: relative;
				color: white;
				display: flex;
				align-items: center;
				overflow: hidden;
				white-space: nowrap;
				cursor: default;
				transition: 0.2s;
			}

			.closetab {
				position: absolute;
				right: 15px;
				cursor: pointer;
			}

			.tab.active {
				background: var(--bg-3);
			}

			.tab:hover {
				background: var(--bg-3);
			}

			.tab span {
				font-weight: 500;
				width: max-content;
				text-wrap: unset;
				overflow: hidden;
				width: 100%;
				mask-image: linear-gradient(to right, black 60%, transparent 85%);
			}

			.tab img {
				width: 24px;
				height: 24px;
				margin-right: 7.5px;
			}

			.toolbar {
				position: absolute;
				top: 20px;
				left: 10px;
				justify-items: center;
				justify-content: center;
				box-sizing: border-box;
				height: 45px;
				display: flex;
				width: 95%;
				gap: 10px;
			}

			#bar {
				flex: 0.97;
				box-sizing: border-box;
				border-radius: 20px;
				border: none;
				background: var(--bg-2);
				padding: 10px 20px;
				outline: none;
				color: white;
				font-size: 17px;
				transition: 0.2s;
			}

			#bar:focus {
				background: var(--bg-3);
			}

			.toolbar button {
				width: 45px;
				height: 45px;
				border-radius: 25px;
				border: none;
				background: var(--bg-2);
				color: white;
				transition: 0.2s;
				cursor: pointer;
				font-size: 17px;
			}

			.toolbar button:hover {
				background: var(--bg-3);
			}

			#newtab {
				width: 45px;
				height: 45px;
				border-radius: 25px;
				border: none;
				background: var(--bg-2);
				color: white;
				transition: 0.2s;
				cursor: default;
				font-size: 17px;
			}

			#newtab:hover {
				background: var(--bg-3);
			}
		</style>

		<div class="controls">
			<div class="tabs" style="display: none">
				<button id="newtab" onclick="newTab()">
					<i class="far fa-plus"></i>
				</button>
			</div>
			<div class="toolbar">
				<button onclick="back()">
					<i class="far fa-arrow-left"></i>
				</button>
				<button onclick="forward()">
					<i class="far fa-arrow-right"></i>
				</button>
				<button onclick="refresh()">
					<i class="far fa-rotate"></i>
				</button>
				<input
					type="text"
					placeholder="Search for something or enter a URL here..."
					id="bar"
				/>
			</div>
		</div>
		<div id="browserframecontainer"></div>
		<script src="/assets/js/cherri.browse.js"></script>
		<script>
			const params = new URLSearchParams(window.location.search);
			if (params.has("url")) {
				(async function () {
					await connection.setTransport("/libcurl/index.mjs", [
						{
							websocket: `${window.location.protocol === "https:" ? "wss://" : "ws://"}${window.location.host}/socket/`
						},
					]);
					nav(params.get("url"));
				})();
			}
		</script>
		<script>
			document.getElementById("csslink").href =
				`/assets/css/colors/${localStorage.getItem("cherri_theme") ?? "default"}.css`;
		</script>
		<script>
			window.addEventListener("keydown", (e) => {
				if (e.altKey && e.code === "KeyG") {
					parent.postMessage({ type: "alt-g" }, "*");
				}
			});
		</script>
		<script src="/assets/js/cherri.ads.js"></script>
		
	</body>
</html>
