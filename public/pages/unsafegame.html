<!doctype html>
<html lang="en" class="obfuscate">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cherri | home</title>
    <link rel="shortcut icon" href="/assets/img/fav.png" type="image/x-icon" />
    <link rel="stylesheet" href="/assets/css/font.css?v=2" />
    <link rel="stylesheet" href="/assets/css/colors/default.css" id="csslink" />
    <link rel="stylesheet" href="/assets/css/index.css" />
    <link rel="stylesheet" href="/assets/icons/css/all-pro.css" />
</head>
<style>
    body, html {
        background: black;
        height: 100vh;
        width: 100vw;
    }

    .iconcontainer {
        display: flex;
        justify-content: center;
        align-items: center;
        background: var(--accent-glow);
        padding: 40px;
        box-sizing: border-box;
        border-radius: 50%;
        aspect-ratio: 1;
        height: 125px;
        width: 125px;
        justify-self: center;
    }

    .iconcontainer i {
        font-size: 50px;
        color: var(--accent);
    }

    center p {
        line-height: 1.5;
    }

    .primary {
        background: var(--accent);
        color: var(--bright-text);
        border: none;
        height: 40px;
        width: 150px;
        padding:10px 20px;
        box-sizing: border-box;
        border-radius: 15px;
        cursor: pointer;
    }

    .secondary {
        background: var(--bg-3);
        color: var(--text);
        border: none;
        height: 40px;
        width: 150px;
        padding:10px 20px;
        box-sizing: border-box;
        border-radius: 15px;
        cursor: pointer;
    }
</style>
<body>
    <center style="position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%); text-align: center;">
        <div class="iconcontainer">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <br>
        <h1>Unsafe Load Detected</h1>
        <p>The game or script you just tried to load triggered <br> an unsafe load. Check the URL and try again. Please open a <br> ticket in the Discord if this issue persists.</p>
        <br>
        <button onclick="location.reload()" class="primary">Reload</button>
        <button onclick="window.location.href = '/pages/home.html'" class="secondary">Back Home</button>
    </center>
    <script>
        document.getElementById("csslink").href =
            `/assets/css/colors/${localStorage.getItem("cherri_theme") ?? "default"}.css`;
    </script>
    
</body>

</html>
