<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cherri</title>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --border: rgba(255, 255, 255, 0.07);
            --border-hover: rgba(255, 255, 255, 0.18);
            --text: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.35);
            --accent: #ffffff;
            --grid-color: rgba(255, 255, 255, 0.035);
        }

        html,
        body {
            height: 100%;
            width: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Figtree', sans-serif;
            overflow: hidden;
        }

        .grid-bg {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 48px 48px;
            z-index: 0;
            pointer-events: none;
        }

        .grid-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 70% 60% at 50% 50%, transparent 30%, var(--bg) 100%);
        }

        .stage {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
        }

        .header {
            font-size: clamp(22px, 3vw, 34px);
            font-weight: 300;
            letter-spacing: -0.02em;
            color: var(--text);
            text-align: center;
            line-height: 1.2;
            max-width: 520px;
            opacity: 0;
            animation: rise 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
        }

        .header strong {
            font-weight: 700;
        }

        .divider {
            width: 32px;
            height: 1px;
            background: var(--border-hover);
            margin: 36px 0;
            opacity: 0;
            animation: rise 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            opacity: 0;
            animation: rise 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.4s forwards;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px 26px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-muted);
            font-family: 'Figtree', sans-serif;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.04em;
            cursor: pointer;
            border-radius: 6px;
            transition: border-color 0.2s, color 0.2s, background 0.2s, transform 0.15s;
            position: relative;
            overflow: hidden;
            user-select: none;
            width: 150px;
        }

        .btn:hover {
            border-color: var(--border-hover);
            color: var(--text);
            background: #181818;
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0px);
        }

        .footnote {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--text-muted);
            opacity: 0;
            animation: rise 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.55s forwards;
            white-space: nowrap;
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="grid-bg"></div>

    <div class="stage">
        <h1 class="header">How would you like to open <strong>Cherri</strong>?</h1>
        <div class="divider"></div>
        <div class="btn-group">
            <button class="btn" id="btn-blank" onclick="abCloak()">about:blank</button>
            <button class="btn" id="btn-blob" onclick="blobCloak()">blob:</button>
        </div>
    </div>

    <script>
        function getBaseUrl() {
            const loc = window.location;
            return loc.protocol + '//' + loc.hostname + (loc.port ? ':' + loc.port : '');
        }

        function makeIframeDoc(src) {
            return `<!DOCTYPE html><html><head><style>*{margin:0;padding:0;border:0}html,body{width:100%;height:100%;overflow:hidden}iframe{display:block;width:100vw;height:100vh;border:none}</style></head><body><iframe src="${src}" allowfullscreen></iframe></body></html>`;
        }

        function abCloak() {
            const w = window.open('about:blank', '_blank');
            const doc = w.document;
            doc.open();
            doc.write(makeIframeDoc(getBaseUrl()));
            doc.close();
        };

        function blobCloak() {
            const html = makeIframeDoc(getBaseUrl());
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            window.open(url, '_blank');
        };
    </script>
</body>
</html>
